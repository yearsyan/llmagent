name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: windows-latest
            goos: windows
            goarch: amd64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o build/llmagent-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/llmagent/

      - name: Archive (linux/macOS)
        if: matrix.goos != 'windows'
        run: |
          cd build && tar czf llmagent-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz llmagent-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Archive (Windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          cd build && mv llmagent-windows-amd64 llmagent.exe && Compress-Archive llmagent.exe llmagent-windows-amd64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llmagent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/llmagent-${{ matrix.goos }}-${{ matrix.goarch }}.*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Display artifacts
        run: find artifacts/ -type f | sort

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
